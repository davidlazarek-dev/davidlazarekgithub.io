<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChimpFinder - Najdi si opičku!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: repeating-linear-gradient(45deg, #ff9a9e, #ff9a9e 10px, #fecfef 10px, #fecfef 20px);">

    <div class="page-layout">
        <div class="chat-app">
            <h1 class="chat-title">ChimpFinder 💕</h1>
            <div class="chat-profile-name">💋 Sexy Simona (Vzdálenost: 1 km)</div>
            
            <!-- Tady je tvůj nahraný obrázek! -->
            <img src="stock-photo-sexy-monkey-113248045.jpg" alt="Sexy Opice" class="chat-img">
            
            <div class="chat-bubble">
                "Ahoj ty můj banánový králi... Slyšela jsem, že jsi docela hráč. Nedáme si spolu jeden spin? 😏🍌"
            </div>
            
            <button class="btn-chat" onclick="alert('Simona si tě zablokovala. Zjistila totiž, že jsi po uši v dluzích u Šimpanze z Banky! 💔')">Poslat banán (Zpráva)</button>
            <button class="btn-escape" onclick="navigate('index.html')">❌ Uprchnout ze seznamky</button>
        </div>
    </div>

    <script>
        // Uchováme parametry, aby ses mohl vrátit do hry beze ztráty!
        function navigate(page) {
            const params = window.location.search; // Vezme aktuální URL data
            window.location.href = page + params;
        }
    </script>
</body>
</html>
